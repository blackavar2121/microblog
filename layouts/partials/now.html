<aside class="now-panel">
  <div class="eyebrow eyebrow--leader">Now</div>

  <div class="now-stack" id="js-now-stack">
    {{/* fallback content while JS loads */}}
    <div class="now-item">
      <div class="eyebrow eyebrow--small">Loading…</div>
    </div>
  </div>

  <hr class="rule" />

  <div class="eyebrow">Subscribe</div>
  <ul class="sub-list mono">
    <li>RSS · <a href="{{ "feed.xml" | absURL }}">/feed.xml</a></li>
    <li>JSON · <a href="{{ "feed.json" | absURL }}">/feed.json</a></li>
  </ul>

  <div class="eyebrow" style="margin-top: var(--s-4);">Elsewhere</div>
  <ul class="sub-list mono">
    <li>Bluesky · <a href="https://bsky.app/profile/blackavar.bsky.social">@blackavar.bsky.social</a></li>
    <li>Mastodon · <a href="https://twit.social/@Blackavar">@Blackavar@twit.social</a></li>
    <li>Threads · <a href="https://www.threads.net/@blackavar">@blackavar</a></li>
    <li>Flickr · <a href="https://www.flickr.com/photos/blackavar">blackavar</a></li>
  </ul>
</aside>

<script>
(function () {
  var RAW = 'https://raw.githubusercontent.com/blackavar2121/microblog/main/data/now.json';
  fetch(RAW)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var stack = document.getElementById('js-now-stack');
      if (!stack || !Array.isArray(data.items)) return;
      stack.innerHTML = data.items.map(function (item) {
        return '<div class="now-item">'
          + '<div class="eyebrow eyebrow--small">' + item.label + '</div>'
          + '<div class="serif-d now-item__value">' + item.value + '</div>'
          + (item.sub ? '<div class="serif italic dim small">' + item.sub + '</div>' : '')
          + '</div>';
      }).join('');
    })
    .catch(function () { /* leave fallback text in place */ });
}());
</script>
