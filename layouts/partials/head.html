<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description | default "Making something out of sticks and stones." }}{{ end }}" />

<link rel="alternate" type="application/rss+xml" href="{{ "feed.xml" | absURL }}" title="{{ .Site.Title }}" />
<link rel="alternate" type="application/json" href="{{ "feed.json" | absURL }}" title="{{ .Site.Title }}" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="{{ "css/bricolage.css" | absURL }}" />

{{ with .Site.Params.feeds.json }}<link rel="alternate" type="application/feed+json" href="{{ . }}" />{{ end }}

<!-- Theme bootstrap: respect localStorage > prefers-color-scheme. Runs before paint to avoid flash. -->
<script>
(function () {
  try {
    var t = localStorage.getItem('theme');
    if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', t);
    var f = localStorage.getItem('fonts') || 'editorial';
    document.documentElement.setAttribute('data-fonts', f);
  } catch (e) {}
})();
</script>
