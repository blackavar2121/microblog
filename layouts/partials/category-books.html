{{/* Books page — entire UI is JS-rendered to survive Micro.blog's multi-template stacking */}}
<div class="js-books-root"></div>

<script>
(function () {
  if (window.__booksMounted) return;
  window.__booksMounted = true;

  var root = document.querySelector('.js-books-root');
  if (!root) return;

  function stars(r) {
    var s = '';
    for (var i = 0; i < 5; i++) s += i < r ? '★' : '<span class="dim">★</span>';
    return s;
  }

  function pct(p) { return Math.round(p * 100) + '%'; }

  function render(d) {
    var reading  = d.reading  || [];
    var finished = d.finished || [];

    var readingHTML = '';
    if (reading.length) {
      var cards = reading.map(function (b) {
        var cover = b.cover_url
          ? '<img src="' + b.cover_url + '" alt="cover" class="book-card__cover" />'
          : '<div class="ph book-card__cover" data-label="cover"></div>';
        var progress = (b.progress != null)
          ? '<div class="progress"><div class="progress__bar" style="width:' + pct(b.progress) + '"></div></div>'
            + '<p class="mono small dim book-card__progress"><span>Started ' + (b.started || '') + '</span><span>' + pct(b.progress) + '</span></p>'
          : '';
        return '<article class="book-card">'
          + cover
          + '<div>'
          + '<h3 class="serif-d book-card__title">' + b.title + '</h3>'
          + '<p class="serif italic dim book-card__author">' + b.author + '</p>'
          + progress
          + '</div>'
          + '</article>';
      }).join('');
      readingHTML = '<section>'
        + '<div class="eyebrow">Currently reading</div>'
        + '<div class="book-grid book-grid--reading">' + cards + '</div>'
        + '</section>';
    }

    var finishedHTML = '';
    if (finished.length) {
      var rows = finished.map(function (b) {
        return '<tr>'
          + '<td class="mono small dim">' + b.finished + '</td>'
          + '<td class="serif-d">' + b.title + '</td>'
          + '<td class="serif italic dim">' + b.author + '</td>'
          + '<td class="text-right stars">' + stars(b.rating) + '</td>'
          + '</tr>';
      }).join('');
      finishedHTML = '<section>'
        + '<div class="eyebrow">Finished — most recent first</div>'
        + '<table class="books-table">'
        + '<thead><tr class="mono small dim"><th>Date</th><th>Title</th><th>Author</th><th class="text-right">Rating</th></tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table>'
        + '</section>';
    }

    var emptyHTML = (!reading.length && !finished.length)
      ? '<p class="mono small dim">Nothing here yet.</p>'
      : '';

    root.innerHTML = '<div class="grid-1col">'
      + '<div class="eyebrow eyebrow--leader">Library</div>'
      + '<h1 class="serif-d page-header__title">Books.</h1>'
      + readingHTML
      + finishedHTML
      + emptyHTML
      + '</div>';
  }

  fetch('https://raw.githubusercontent.com/blackavar2121/microblog/main/data/books.json')
    .then(function (r) { return r.json(); })
    .then(render)
    .catch(function () {
      root.innerHTML = '<p class="mono small dim">Could not load books data.</p>';
    });
}());
</script>
