{{/* Games page — entire UI is JS-rendered to survive Micro.blog's multi-template stacking */}}
<div class="js-games-root"></div>

<script>
(function () {
  if (window.__gamesMounted) return;
  window.__gamesMounted = true;

  var root = document.querySelector('.js-games-root');
  if (!root) return;

  function stars(r) {
    var s = '';
    for (var i = 0; i < 5; i++) s += i < r ? '★' : '<span class="dim">★</span>';
    return s;
  }

  function render(d) {
    var np = d.now_playing || [];
    var bl = d.backlog     || [];
    var fi = d.finished    || [];

    var nowHTML = np.map(function (g) {
      var art = g.cover_url
        ? '<img src="' + g.cover_url + '" alt="' + g.title + '" class="now-playing__art" />'
        : '<div class="now-playing__art ph iri" aria-label="key art"></div>';
      var titleEl = g.steam_url
        ? '<a href="' + g.steam_url + '" target="_blank" rel="noopener" class="now-playing__title-link">' + g.title + '</a>'
        : g.title;
      return '<article class="now-playing">'
        + art
        + '<div class="now-playing__body">'
        + '<span class="badge badge--iri mono">Now playing</span>'
        + '<h2 class="serif-d now-playing__title">' + titleEl + '</h2>'
        + '<p class="mono small dim">' + g.platform + ' · ' + g.hours + ' hours · started ' + g.started + '</p>'
        + (g.note ? '<p class="serif italic dim now-playing__note">&ldquo;' + g.note + '&rdquo;</p>' : '')
        + '</div></article>';
    }).join('');

    var backlogHTML = bl.length
      ? bl.map(function (b, i) {
          return '<li>'
            + '<span class="mono small dim">' + String(i + 1).padStart(2, '0') + '</span>'
            + '<span class="serif-d">' + b.title + '</span>'
            + '<span class="mono small dim">' + b.platform + '</span>'
            + '</li>';
        }).join('')
      : '<li class="mono small dim">Nothing queued up yet.</li>';

    var finishedHTML = fi.length
      ? fi.map(function (g) {
          var titleEl = g.steam_url
            ? '<a href="' + g.steam_url + '" target="_blank" rel="noopener" class="game-link serif-d">' + g.title + '</a>'
            : '<span class="serif-d">' + g.title + '</span>';
          return '<li>'
            + '<time class="mono small dim">' + g.finished + '</time>'
            + titleEl
            + '<span class="stars" aria-label="' + g.rating + ' of 5 stars">' + stars(g.rating) + '</span>'
            + '</li>';
        }).join('')
      : '<li class="mono small dim">Nothing finished yet.</li>';

    root.innerHTML = '<div class="grid-1col">'
      + '<header class="games-header">'
      +   '<div>'
      +     '<div class="eyebrow eyebrow--leader">Games journal</div>'
      +     '<h1 class="serif-d page-header__title">Games.</h1>'
      +   '</div>'
      +   '<div class="stat-row mono">'
      +     '<div class="stat"><div class="stat__label">Now</div><div class="stat__value serif-d">' + np.length + '</div></div>'
      +     '<div class="stat"><div class="stat__label">Backlog</div><div class="stat__value serif-d">' + bl.length + '</div></div>'
      +     '<div class="stat"><div class="stat__label">Finished</div><div class="stat__value serif-d">' + fi.length + '</div></div>'
      +   '</div>'
      + '</header>'
      + nowHTML
      + '<div class="two-col">'
      +   '<section><div class="eyebrow">Backlog</div><ol class="rank-list">' + backlogHTML + '</ol></section>'
      +   '<section><div class="eyebrow">Finished</div><ul class="date-list">' + finishedHTML + '</ul></section>'
      + '</div>'
      + '</div>';
  }

  fetch('https://raw.githubusercontent.com/blackavar2121/microblog/main/data/games.json')
    .then(function (r) { return r.json(); })
    .then(render)
    .catch(function () {
      root.innerHTML = '<p class="mono small dim">Could not load games data.</p>';
    });
}());
</script>
