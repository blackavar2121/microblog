{{/* Pigeons page — entire UI is JS-rendered to survive Micro.blog's multi-template stacking */}}
<div class="js-pigeons-root"></div>

<script>
(function () {
  if (window.__pigeonsMounted) return;
  window.__pigeonsMounted = true;

  var root = document.querySelector('.js-pigeons-root');
  if (!root) return;

  function firstImg(html) {
    var m = (html || '').match(/<img[^>]+src="([^"]+)"/i);
    return m ? m[1] : null;
  }

  function render(roster, photoMap) {
    if (!roster.length) {
      root.innerHTML = '<p class="mono small dim">No pigeons catalogued yet.</p>';
      return;
    }

    var featured  = roster[0];
    var featPhoto = photoMap[featured.name.toLowerCase()];

    var featArt = featPhoto
      ? '<img src="' + featPhoto + '" alt="' + featured.name + '" class="pigeons-detail__photo pigeons-detail__photo--img" />'
      : '<div class="ph iri pigeons-detail__photo" data-label="pigeon \xb7 ' + featured.name.toLowerCase() + '"></div>';

    var rosterHTML = roster.map(function (b, i) {
      var photo = photoMap[b.name.toLowerCase()];
      var thumb = photo
        ? '<img src="' + photo + '" alt="' + b.name + '" class="roster__photo roster__photo--img" />'
        : '<div class="ph roster__photo" aria-hidden="true"></div>';
      return '<li>'
        + '<span class="mono small dim">' + String(i + 1).padStart(2, '0') + '</span>'
        + thumb
        + '<div>'
        +   '<div class="serif-d roster__name">' + b.name + '</div>'
        +   '<div class="mono small dim">' + b.spot + '</div>'
        + '</div>'
        + '<span class="mono small dim">' + b.date + '</span>'
        + '</li>';
    }).join('');

    root.innerHTML = '<div class="grid-1col">'
      + '<header class="pigeons-header">'
      +   '<div>'
      +     '<div class="eyebrow eyebrow--leader">Catalogue</div>'
      +     '<h1 class="serif-d page-header__title">Pigeons.</h1>'
      +   '</div>'
      +   '<div class="mono small dim text-right">' + roster.length + ' catalogued \xb7 ongoing</div>'
      + '</header>'
      + '<div class="pigeons-detail">'
      +   '<section>'
      +     featArt
      +     '<h2 class="serif-d pigeons-detail__name">' + featured.name + '</h2>'
      +     '<p class="serif italic dim">Last spotted at the ' + featured.spot + ', on ' + featured.date + '.</p>'
      +     '<p class="serif pigeons-detail__note">' + featured.note + '</p>'
      +   '</section>'
      +   '<section>'
      +     '<div class="eyebrow">The roster</div>'
      +     '<ul class="roster">' + rosterHTML + '</ul>'
      +   '</section>'
      + '</div>'
      + '</div>';
  }

  var rosterURL = 'https://raw.githubusercontent.com/blackavar2121/microblog/main/data/pigeons.json';
  var feedURL   = 'https://bricolage.micro.blog/categories/pigeons/feed.json';

  Promise.all([
    fetch(rosterURL).then(function (r) { return r.json(); }),
    fetch(feedURL).then(function (r) { return r.json(); }).catch(function () { return { items: [] }; })
  ]).then(function (results) {
    var roster = (results[0].birds || []);
    var feed   = results[1];

    var photoMap    = {};
    var latestPhoto = null;

    (feed.items || []).forEach(function (item) {
      var img = firstImg(item.content_html);
      if (!img) return;
      if (!latestPhoto) latestPhoto = img;
      var text = ((item.content_text || '') + ' ' + (item.title || '')).toLowerCase();
      roster.forEach(function (b) {
        var key = b.name.toLowerCase();
        if (!photoMap[key] && text.indexOf(key) !== -1) {
          photoMap[key] = img;
        }
      });
    });

    /* Featured bird always gets the most recent photo as a fallback */
    if (roster.length && latestPhoto) {
      var featKey = roster[0].name.toLowerCase();
      if (!photoMap[featKey]) photoMap[featKey] = latestPhoto;
    }

    render(roster, photoMap);
  }).catch(function () {
    render([], {});
  });
}());
</script>
